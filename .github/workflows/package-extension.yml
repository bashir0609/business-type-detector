name: Package Chrome Extension

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read manifest version
        id: manifest
        shell: bash
        run: |
          version="$(python3 - <<'PY'
          import json
          with open("manifest.json", "r", encoding="utf-8") as f:
              print(json.load(f)["version"])
          PY
          )"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "archive=business-type-detector-$version.zip" >> "$GITHUB_OUTPUT"

      - name: Create extension archive
        shell: bash
        run: |
          mkdir -p dist
          zip -r "dist/${{ steps.manifest.outputs.archive }}" . \
            -x ".git/*" ".github/*" "dist/*" "env"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: business-type-detector-${{ steps.manifest.outputs.version }}
          path: dist/${{ steps.manifest.outputs.archive }}

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.manifest.outputs.archive }}
